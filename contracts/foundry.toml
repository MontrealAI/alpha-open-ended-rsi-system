[profile.default]
src = "contracts-src"
test = "foundry-test"
out = "foundry-out"
cache_path = "foundry-cache"
libs = []
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 256 }
invariant = { runs = 128, depth = 64 }
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/"
]
include_paths = ["node_modules"]

[fmt]
line_length = 120
